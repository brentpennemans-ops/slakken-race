<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐌 Slakken Race!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Arial Black', Arial, sans-serif; width: 100vw; height: 100vh; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #countdown { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 50; }
  #cdnum { font-size: 200px; font-weight: 900; color: #fff; text-shadow: 0 0 60px currentColor, 0 10px 0 rgba(0,0,0,.6); transition: transform .1s; }
  #topbar { position: fixed; top: 0; left: 0; right: 0; height: 54px; background: linear-gradient(to bottom, rgba(0,0,0,.75), transparent); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 20; }
  .hud-pill { background: rgba(0,0,0,.65); border: 2px solid rgba(255,255,255,.25); border-radius: 22px; padding: 5px 16px; color: #fff; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .hud-pill .val { color: #ffe44e; font-weight: 900; font-size: 17px; }
  #bigpos { position: fixed; top: 60px; right: 18px; background: rgba(0,0,0,.7); border: 2px solid rgba(255,255,255,.2); border-radius: 14px; padding: 6px 14px; text-align: center; pointer-events: none; z-index: 20; color: rgba(255,255,255,.7); font-size: 12px; }
  #bigpos .pnum { font-size: 48px; font-weight: 900; color: #ffe44e; line-height: 1; }
  #speedo { position: fixed; bottom: 18px; right: 18px; width: 108px; height: 108px; border-radius: 50%; background: rgba(0,0,0,.75); border: 3px solid rgba(255,255,255,.3); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 20; }
  #speedo .sv { font-size: 32px; font-weight: 900; color: #7eff7e; line-height: 1; }
  #speedo .sl { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; }
  #itemslot { position: fixed; bottom: 18px; left: 18px; width: 76px; height: 76px; border-radius: 14px; background: rgba(0,0,0,.75); border: 3px solid rgba(255,255,255,.3); display: flex; align-items: center; justify-content: center; font-size: 40px; pointer-events: none; z-index: 20; }
  #itemhint { position: fixed; bottom: 100px; left: 18px; color: rgba(255,255,255,.5); font-size: 11px; pointer-events: none; z-index: 20; }
  #minimap { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); width: 130px; height: 130px; border-radius: 50%; overflow: hidden; border: 2px solid rgba(255,255,255,.3); pointer-events: none; z-index: 20; }
  #minimap canvas { width: 100%; height: 100%; }
  #wrongway { position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%); font-size: 52px; font-weight: 900; color: #ff3333; text-shadow: 0 0 20px #f00; pointer-events: none; opacity: 0; z-index: 30; letter-spacing: 2px; }
  #banner { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 34px; font-weight: 900; color: #ffe44e; text-shadow: 0 0 24px #fa0; pointer-events: none; opacity: 0; z-index: 30; white-space: nowrap; }
  #slidetimer { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 110px; font-weight: 900; color: #fff; text-shadow: 0 0 40px #88f; pointer-events: none; opacity: 0; z-index: 40; }
  #obslegend { position: fixed; top: 64px; left: 18px; background: rgba(0,0,0,.6); border-radius: 10px; padding: 8px 14px; color: #fff; font-size: 12px; pointer-events: none; z-index: 20; line-height: 1.9; }
  #ctrls { position: fixed; bottom: 10px; right: 140px; color: rgba(255,255,255,.35); font-size: 11px; pointer-events: none; z-index: 20; text-align: right; }
  #finish { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 80; }
  #finish h1 { font-size: 72px; color: #ffe44e; text-shadow: 0 0 40px #fa0; }
  #finish .finfo { font-size: 22px; color: #fff; }
  #finish button { margin-top: 10px; padding: 14px 44px; font-size: 20px; font-weight: 900; border-radius: 14px; border: none; background: linear-gradient(135deg, #e8a020, #f0d020); color: #000; cursor: pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="topbar">
  <div class="hud-pill">🏁 Ronde <span class="val" id="lapval">1</span> / 3</div>
  <div class="hud-pill">⏱ <span class="val" id="timeval">0.00</span></div>
  <div class="hud-pill">Best <span class="val" id="bestval">--</span></div>
</div>
<div id="bigpos">Positie<div class="pnum" id="posnum">1</div><div style="font-size:11px;color:rgba(255,255,255,.45)">van 4</div></div>
<div id="speedo"><div class="sv" id="sval">0</div><div class="sl">km/h</div></div>
<div id="itemslot">❓</div>
<div id="itemhint">E = item gooien</div>
<div id="minimap"><canvas id="mapc" width="130" height="130"></canvas></div>
<div id="wrongway">⚠ VERKEERDE KANT!</div>
<div id="banner"></div>
<div id="slidetimer"></div>
<div id="countdown"><div id="cdnum"></div></div>
<div id="obslegend">🛢️ Vat = uitglijden<br>🪨 Steen = stop<br>🟫 Modder = traag</div>
<div id="ctrls">↑↓←→ / WASD rijden · Spatie remmen · E item gooien</div>
<div id="finish">
  <h1 id="fh1">🏆</h1>
  <div class="finfo" id="fp"></div>
  <div class="finfo" id="ft"></div>
  <div class="finfo" id="fb"></div>
  <button onclick="location.reload()">Opnieuw racen! 🐌</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);
scene.fog=new THREE.FogExp2(0x87ceeb,.009);
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,800);
scene.add(camera);
window.addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});

scene.add(new THREE.AmbientLight(0xffeedd,.8));
const sun=new THREE.DirectionalLight(0xfff8e0,1.1);
sun.position.set(100,150,80);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-250;sun.shadow.camera.right=250;
sun.shadow.camera.top=250;sun.shadow.camera.bottom=-250;sun.shadow.camera.far=600;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb,0x4a7a20,.5));

const TW=16;
const trackPts=[
  new THREE.Vector3(90,0,0),new THREE.Vector3(100,0,-30),new THREE.Vector3(95,0,-70),
  new THREE.Vector3(70,0,-110),new THREE.Vector3(30,0,-135),new THREE.Vector3(-10,0,-130),
  new THREE.Vector3(-50,0,-110),new THREE.Vector3(-80,0,-75),new THREE.Vector3(-95,0,-35),
  new THREE.Vector3(-90,0,5),new THREE.Vector3(-75,0,45),new THREE.Vector3(-40,0,80),
  new THREE.Vector3(0,0,90),new THREE.Vector3(40,0,80),new THREE.Vector3(70,0,50),
  new THREE.Vector3(85,0,25),new THREE.Vector3(90,0,0),
];
const curve=new THREE.CatmullRomCurve3(trackPts,true,'catmullrom',.5);
const SEG=200;

const gnd=new THREE.Mesh(new THREE.PlaneGeometry(800,800),new THREE.MeshLambertMaterial({color:0x3e8c18}));
gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);

(function(){
  const verts=[],uvs=[],idxs=[],norms=[];
  for(let i=0;i<=SEG;i++){
    const t=i/SEG,p=curve.getPoint(t),tan=curve.getTangent(t).normalize();
    const right=new THREE.Vector3(-tan.z,0,tan.x);
    const L=p.clone().addScaledVector(right,-TW/2),R=p.clone().addScaledVector(right,TW/2);
    verts.push(L.x,.05,L.z,R.x,.05,R.z);norms.push(0,1,0,0,1,0);uvs.push(0,i*.15,1,i*.15);
  }
  for(let i=0;i<SEG;i++){const a=i*2,b=a+1,c=a+2,d=a+3;idxs.push(a,c,b,b,c,d);}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(norms,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idxs);
  scene.add(new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0x2a2a2a})));
  for(let side of[-1,1]){
    for(let i=0;i<SEG;i++){
      const t=i/SEG,p=curve.getPoint(t),tan=curve.getTangent(t);
      const right=new THREE.Vector3(-tan.z,0,tan.x).normalize();
      const col=(Math.floor(i/3)%2===0)?0xff2222:0xffffff;
      const kerb=new THREE.Mesh(new THREE.BoxGeometry(TW/SEG*8,.15,1.8),new THREE.MeshLambertMaterial({color:col}));
      const kp=p.clone().addScaledVector(right,side*(TW/2+.9));
      kerb.position.set(kp.x,.07,kp.z);kerb.rotation.y=Math.atan2(tan.x,tan.z);scene.add(kerb);
    }
  }
  for(let i=0;i<SEG;i+=4){
    const p=curve.getPoint(i/SEG),tan=curve.getTangent(i/SEG);
    const dash=new THREE.Mesh(new THREE.PlaneGeometry(.4,3),new THREE.MeshBasicMaterial({color:0xffff44}));
    dash.rotation.x=-Math.PI/2;dash.rotation.z=Math.atan2(tan.x,tan.z);dash.position.set(p.x,.1,p.z);scene.add(dash);
  }
  const sp=curve.getPoint(0),stan=curve.getTangent(0),sright=new THREE.Vector3(-stan.z,0,stan.x).normalize();
  for(let cx=0;cx<8;cx++)for(let rz=0;rz<3;rz++)if((cx+rz)%2===0){
    const sq=new THREE.Mesh(new THREE.PlaneGeometry(TW/8,1),new THREE.MeshBasicMaterial({color:rz%2===0?0:0xffffff}));
    sq.rotation.x=-Math.PI/2;
    const wp=sp.clone().addScaledVector(sright,(cx-3.5)*(TW/8)).addScaledVector(stan,rz-1);
    wp.y=.13;sq.position.copy(wp);sq.rotation.z=Math.atan2(sright.x,sright.z);scene.add(sq);
  }
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(.2,.2,10,8),new THREE.MeshLambertMaterial({color:0xcccccc}));
  pole.position.set(sp.x+sright.x*(TW/2+2),5,sp.z+sright.z*(TW/2+2));scene.add(pole);
  const flag=new THREE.Mesh(new THREE.PlaneGeometry(5,3),new THREE.MeshLambertMaterial({color:0xffffff,side:THREE.DoubleSide}));
  flag.position.set(sp.x+sright.x*(TW/2+4.5),9.5,sp.z+sright.z*(TW/2+4.5));scene.add(flag);
})();

const obstacles=[];
const OBSDATA=[[.07,-3,0],[.14,4,1],[.21,-2,2],[.29,3,0],[.36,-4,1],[.43,3,2],[.51,-3,0],[.58,4,1],[.65,-2,2],[.72,3,0],[.80,-4,1],[.87,3,2],[.93,-3,0]];
OBSDATA.forEach(([ot,side,type],i)=>{
  const p=curve.getPoint(ot),tan=curve.getTangent(ot);
  const right=new THREE.Vector3(-tan.z,0,tan.x).normalize();
  const wp=p.clone().addScaledVector(right,side);
  const g=new THREE.Group();
  if(type===0){
    const col=[0xff6600,0xcc0000,0x0055cc,0x884400][i%4];
    const b=new THREE.Mesh(new THREE.CylinderGeometry(1,1,2.2,12),new THREE.MeshLambertMaterial({color:col}));
    b.castShadow=true;g.add(b);
    [.7,-.7].forEach(y=>{const r=new THREE.Mesh(new THREE.TorusGeometry(1.02,.1,6,12),new THREE.MeshLambertMaterial({color:0x999}));r.position.y=y;r.rotation.x=Math.PI/2;g.add(r);});
    g.position.set(wp.x,1.1,wp.z);g.userData={type:'vat',radius:2.0};
  } else if(type===1){
    const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(1.6,0),new THREE.MeshLambertMaterial({color:0x888877}));
    rock.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);rock.castShadow=true;g.add(rock);
    g.position.set(wp.x,.8,wp.z);g.userData={type:'steen',radius:2.4};
  } else {
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(3,3,.18,16),new THREE.MeshLambertMaterial({color:0x5c3317})));
    g.add(new THREE.Mesh(new THREE.CylinderGeometry(3.4,3.4,.07,16),new THREE.MeshLambertMaterial({color:0x7a4a2a,transparent:true,opacity:.7})));
    g.position.set(wp.x,.1,wp.z);g.userData={type:'modder',radius:3.2};
  }
  scene.add(g);obstacles.push(g);
});

const ITEMS_LIST=['🐚','🍄','⚡','🌶️','💣'];
const itemBoxes=[];
[.1,.22,.35,.5,.63,.76,.88].forEach(t=>{
  const p=curve.getPoint(t),g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(3,3,3),new THREE.MeshBasicMaterial({color:0xffe44e,transparent:true,opacity:.75})));
  g.add(new THREE.Mesh(new THREE.BoxGeometry(3,3,3),new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true})));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.6,8,6),new THREE.MeshBasicMaterial({color:0xffffff})));
  g.position.set(p.x,2,p.z);g.userData={active:true,respawnAt:0};scene.add(g);itemBoxes.push(g);
});

function makeTree(x,z){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.3,.5,3.5,7),new THREE.MeshLambertMaterial({color:0x8B4513}));
  trunk.position.y=1.75;trunk.castShadow=true;g.add(trunk);
  [[0,5.5,2.8],[0,7,2.2],[-0.3,6,2.5]].forEach(([dx,dy,r],k)=>{
    const l=new THREE.Mesh(new THREE.SphereGeometry(r,8,7),new THREE.MeshLambertMaterial({color:[0x2d8a10,0x3aa015,0x268808][k]}));
    l.position.set(dx,dy,0);g.add(l);
  });
  g.position.set(x,0,z);g.scale.setScalar(.8+Math.random()*.5);scene.add(g);
}
[[130,30],[130,-30],[120,-80],[90,-130],[40,-155],[0,-155],[-40,-150],[-90,-120],[-115,-60],[-120,0],[-110,55],[-75,105],[-30,115],[30,110],[75,90],[110,55],[60,-30],[-60,-20],[150,0],[-130,-10],[0,130]].forEach(([x,z])=>makeTree(x,z));

const stands=new THREE.Mesh(new THREE.BoxGeometry(80,8,12),new THREE.MeshLambertMaterial({color:0x4466cc}));
stands.position.set(30,4,-165);scene.add(stands);
const audienceArr=[];
for(let i=0;i<40;i++){
  const b=new THREE.Mesh(new THREE.SphereGeometry(.9,6,5),new THREE.MeshLambertMaterial({color:[0xff6688,0x6688ff,0xffaa44,0x44ffaa,0xee44ee,0xffff44][i%6]}));
  b.position.set(-20+i*2.2,9+Math.random()*3,-165+Math.random()*8);
  b.userData.wave=Math.random()*6.28;scene.add(b);audienceArr.push(b);
}
const cloudArr=[];
for(let i=0;i<20;i++){
  const cg=new THREE.Group();
  [0,.7,-.5].forEach((ox,j)=>{const cl=new THREE.Mesh(new THREE.SphereGeometry(6+j*2,7,5),new THREE.MeshLambertMaterial({color:0xffffff}));cl.position.set(ox*10,0,0);cg.add(cl);});
  cg.position.set((Math.random()-.5)*400,60+Math.random()*40,(Math.random()-.5)*400);
  cg.userData.drift=(Math.random()-.5)*.02;scene.add(cg);cloudArr.push(cg);
}
scene.add(new THREE.Mesh(new THREE.SphereGeometry(500,16,8),new THREE.MeshBasicMaterial({color:0x87ceeb,side:THREE.BackSide})));

function lighten(hex,f){const r=Math.min(255,((hex>>16)&0xff)*(1+f)),gv=Math.min(255,((hex>>8)&0xff)*(1+f)),b=Math.min(255,(hex&0xff)*(1+f));return (r<<16)|(gv<<8)|b;}
function makeSnail(bc,sc1,sc2,ec){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.SphereGeometry(1,14,10),new THREE.MeshLambertMaterial({color:bc}));
  body.scale.set(2,.7,1.1);body.position.set(.3,.5,0);body.castShadow=true;g.add(body);
  const bel=new THREE.Mesh(new THREE.SphereGeometry(.8,10,7),new THREE.MeshLambertMaterial({color:lighten(bc,.3)}));
  bel.scale.set(1.8,.5,1);bel.position.set(.4,.2,.1);g.add(bel);
  const hd=new THREE.Mesh(new THREE.SphereGeometry(.7,12,9),new THREE.MeshLambertMaterial({color:bc}));
  hd.scale.set(1.1,.85,1);hd.position.set(1.9,.7,0);hd.castShadow=true;g.add(hd);
  const sn=new THREE.Mesh(new THREE.SphereGeometry(.35,8,6),new THREE.MeshLambertMaterial({color:lighten(bc,.1)}));
  sn.scale.set(1.1,.7,1);sn.position.set(2.55,.5,0);g.add(sn);
  const smile=new THREE.Mesh(new THREE.TorusGeometry(.22,.04,6,12,Math.PI),new THREE.MeshLambertMaterial({color:0x882222}));
  smile.rotation.set(Math.PI/2,0,Math.PI);smile.position.set(2.8,.35,0);g.add(smile);
  const foot=new THREE.Mesh(new THREE.PlaneGeometry(4,.9),new THREE.MeshLambertMaterial({color:0xc8906a,side:THREE.DoubleSide}));
  foot.rotation.x=-Math.PI/2;foot.position.set(.5,.04,0);g.add(foot);
  [-1,1].forEach(s=>{
    const stalk=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.6,7),new THREE.MeshLambertMaterial({color:bc}));
    stalk.position.set(2,.95,s*.3);g.add(stalk);
    const eye=new THREE.Mesh(new THREE.SphereGeometry(.2,8,7),new THREE.MeshLambertMaterial({color:0xffffff}));
    eye.position.set(2,1.35,s*.3);g.add(eye);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(.11,6,5),new THREE.MeshLambertMaterial({color:ec||0x111122}));
    pupil.position.set(2.19,1.37,s*.3);g.add(pupil);
  });
  [-1,1].forEach(s=>{
    const ant=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,.55,6),new THREE.MeshLambertMaterial({color:bc}));
    ant.rotation.z=s*.25-.15;ant.position.set(2.2,1.65,s*.22);g.add(ant);
    const tip=new THREE.Mesh(new THREE.SphereGeometry(.12,6,5),new THREE.MeshLambertMaterial({color:sc1}));
    tip.position.set(2.3+s*.1,2.1,s*.38);g.add(tip);
  });
  const sh=new THREE.Group();
  const shellBody=new THREE.Mesh(new THREE.SphereGeometry(1.25,14,12),new THREE.MeshLambertMaterial({color:sc1}));
  shellBody.scale.set(1,1.15,.9);sh.add(shellBody);
  for(let i=0;i<4;i++){
    const stripe=new THREE.Mesh(new THREE.TorusGeometry(1.05-.22*i,.09,6,24,Math.PI*1.6),new THREE.MeshLambertMaterial({color:sc2}));
    stripe.rotation.set(.25+i*.15,0,i*.7);sh.add(stripe);
  }
  const shellTip=new THREE.Mesh(new THREE.ConeGeometry(.32,.65,8),new THREE.MeshLambertMaterial({color:sc2}));
  shellTip.rotation.z=-.7;shellTip.position.set(.6,1.05,0);sh.add(shellTip);
  sh.position.set(-.5,.9,0);g.add(sh);g.userData.shell=sh;
  return g;
}

const RCFG=[
  {name:'Jij',bc:0x5ec922,sc1:0xdd5500,sc2:0xffaa33,ec:0x1133ff,isPlayer:true},
  {name:'Sien',bc:0xff77aa,sc1:0x7711bb,sc2:0xcc77ff,ec:0xff2244},
  {name:'Theo',bc:0x33aaff,sc1:0x1144aa,sc2:0x77ccff,ec:0xff8800},
  {name:'René',bc:0xffcc33,sc1:0xcc3300,sc2:0xff8833,ec:0x228800},
];
const racers=[];
RCFG.forEach((cfg,i)=>{
  const mesh=makeSnail(cfg.bc,cfg.sc1,cfg.sc2,cfg.ec);
  mesh.scale.setScalar(1.3);
  const startT=(1-i*.025)%1;
  const sp=curve.getPoint(startT),stan=curve.getTangent(startT);
  const sright=new THREE.Vector3(-stan.z,0,stan.x).normalize();
  const lane=(i%2===0?-1:1)*(i<2?3:5.5);
  mesh.position.copy(sp).addScaledVector(sright,lane);
  mesh.position.y=0;mesh.rotation.y=Math.atan2(stan.x,stan.z);mesh.castShadow=true;scene.add(mesh);
  racers.push({
    mesh,cfg,t:startT,lastT:startT,speed:0,maxSpd:.32,accel:.012,
    laps:0,lapTimes:[],item:null,wobble:0,pos:i+1,
    finished:false,finishTime:null,
    slideTimer:0,mudTimer:0,passedHalf:false,
    hitCooldown:0,aiThrowTimer:300+Math.floor(Math.random()*300)
  });
});
const P=racers[0];

const projs=[];

function spawnProj(owner,typeEmoji){
  const tan=curve.getTangent(owner.t);
  const col={'🐚':0xdd6622,'⚡':0xffff00,'💣':0x222222,'🌶️':0xff2200,'🍄':0xee3311}[typeEmoji]||0xff8800;
  const pj=new THREE.Mesh(new THREE.SphereGeometry(.8,8,6),new THREE.MeshLambertMaterial({color:col}));
  pj.position.copy(owner.mesh.position).add(new THREE.Vector3(0,1.5,0));
  scene.add(pj);
  projs.push({mesh:pj,vx:tan.x*.85,vz:tan.z*.85,life:160,type:typeEmoji,owner,wallBounces:0});
  owner.item=null;
  if(owner.cfg.isPlayer)document.getElementById('itemslot').textContent='❓';
}

const K={};
document.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(e.code==='KeyE'&&P.item&&gameState==='racing'&&!P.finished&&P.slideTimer<=0) spawnProj(P,P.item);
});
document.addEventListener('keyup',e=>{K[e.code]=false;});

let gameState='countdown';
let raceMs=0,bestLap=Infinity,lapStartMs=0;
let cdTimer=0,cdPhase=0,wrongTimer=0,bannerTimer=0,slideDisplaySec=0;

function showBanner(txt,dur){document.getElementById('banner').textContent=txt;document.getElementById('banner').style.opacity='1';bannerTimer=dur||90;}

function closestT(pos){
  let bT=0,bD=Infinity;
  for(let i=0;i<SEG;i++){const t=i/SEG,p=curve.getPoint(t),d=(p.x-pos.x)**2+(p.z-pos.z)**2;if(d<bD){bD=d;bT=t;}}
  return bT;
}
function onTrack(pos){
  let bD=Infinity;
  for(let i=0;i<SEG;i++){const p=curve.getPoint(i/SEG),d=(p.x-pos.x)**2+(p.z-pos.z)**2;if(d<bD)bD=d;}
  return Math.sqrt(bD)<TW/2+1.5;
}

function triggerSlide(r,fromPos){
  if(r.slideTimer>0)return;
  r.slideTimer=180;r.hitCooldown=220;
  if(fromPos){
    const away=new THREE.Vector3().subVectors(r.mesh.position,fromPos).setY(0);
    if(away.lengthSq()<0.01)away.set(1,0,0);
    away.normalize().multiplyScalar(5);
    r.mesh.position.add(away);
  }
  r.speed*=0.2;
  if(r.cfg.isPlayer){
    slideDisplaySec=3;
    document.getElementById('slidetimer').textContent='3';
    document.getElementById('slidetimer').style.opacity='1';
  }
}

function checkObstacles(r){
  if(r.hitCooldown>0)return;
  for(const obs of obstacles){
    const d=r.mesh.position.distanceTo(obs.position);
    if(d<obs.userData.radius){
      if(obs.userData.type==='vat'){triggerSlide(r,obs.position);if(r.cfg.isPlayer)showBanner('🛢️ Vat! Glij uit! 😵',60);}
      else if(obs.userData.type==='steen'){r.speed=0;triggerSlide(r,obs.position);if(r.cfg.isPlayer)showBanner('🪨 Steen! Uitgegleden! 💥',60);}
      else if(obs.userData.type==='modder'&&r.mudTimer<=0){r.mudTimer=180;r.hitCooldown=200;if(r.cfg.isPlayer)showBanner('🟫 Modder! Traag! 🐌',60);}
      break;
    }
  }
}

function checkItemPickup(r){
  if(r.item)return;
  for(const box of itemBoxes){
    if(!box.userData.active)continue;
    if(box.position.distanceTo(r.mesh.position)<3.5){
      r.item=ITEMS_LIST[Math.floor(Math.random()*ITEMS_LIST.length)];
      box.userData.active=false;box.visible=false;box.userData.respawnAt=performance.now()+9000;
      if(r.cfg.isPlayer){document.getElementById('itemslot').textContent=r.item;showBanner('📦 '+r.item+' gepakt! (E = gooien)',60);}
      break;
    }
  }
}

function applyHit(r,type,fromPos){
  const ip=r.cfg.isPlayer;
  if(type==='⚡'){triggerSlide(r,fromPos);showBanner(ip?'⚡ Bliksem! Jij glijdt uit! 😵':'⚡ Tegenstander glijdt uit!',65);}
  else if(type==='💣'){r.speed=0;triggerSlide(r,fromPos);showBanner(ip?'💣 BOEM! Jij 3s uitgegleden! 😵':'💣 BOEM!',70);}
  else if(type==='🌶️'){r.speed*=-1.3;triggerSlide(r,fromPos);showBanner(ip?'🌶️ Peper! Jij achteruit! 😵':'🌶️ Tegenstander achteruit!',65);}
  else if(type==='🍄'){r.mudTimer=160;showBanner(ip?'🍄 Modder! Jij traag! 😵':'🍄 Tegenstander traag!',65);}
  else{triggerSlide(r,fromPos);showBanner(ip?'🐚 Raak! Jij glijdt uit! 😵':'🐚 Tegenstander glijdt uit!',55);}
}

function updateRacer(r,dt){
  if(r.finished)return;
  if(r.hitCooldown>0)r.hitCooldown-=dt;
  if(r.mudTimer>0)r.mudTimer-=dt;
  const mudMult=r.mudTimer>0?.45:1;

  if(r.slideTimer>0){
    r.slideTimer-=dt;
    r.mesh.rotation.y+=0.09;r.speed*=0.97;
    const fwd=new THREE.Vector3(Math.sin(r.mesh.rotation.y),0,Math.cos(r.mesh.rotation.y));
    r.mesh.position.addScaledVector(fwd,r.speed*0.3);r.mesh.position.y=0;
    if(r.cfg.isPlayer){
      r.t=closestT(r.mesh.position);
      const s=Math.ceil(r.slideTimer/60);
      if(s!==slideDisplaySec){
        slideDisplaySec=s;
        const el=document.getElementById('slidetimer');
        if(s>0){el.textContent=String(s);el.style.opacity='1';}else el.style.opacity='0';
      }
    }
    r.wobble+=0.06;
    r.mesh.children[0].position.y=.5+Math.sin(r.wobble)*.06;
    if(r.mesh.userData.shell)r.mesh.userData.shell.rotation.z=Math.sin(r.wobble*.4)*.05;
    r.mesh.children[0].material.color.setHex(r.mudTimer>0?0x8b6a30:r.cfg.bc);
    if(r.cfg.isPlayer){
      const prev=r.lastT,cur=r.t;
      if(cur>0.4&&cur<0.6)r.passedHalf=true;
      if(prev>0.85&&cur<0.15&&r.passedHalf){r.passedHalf=false;lapCrossed(r);}
      r.lastT=cur;
    }
    return;
  }

  if(r.cfg.isPlayer){
    const gas=K['ArrowUp']||K['KeyW'],brk=K['ArrowDown']||K['KeyS']||K['Space'];
    const lft=K['ArrowLeft']||K['KeyA'],rgt=K['ArrowRight']||K['KeyD'];
    if(gas)r.speed=Math.min(r.maxSpd*mudMult,r.speed+r.accel);
    else if(brk)r.speed=Math.max(-r.maxSpd*.3,r.speed-r.accel*2);
    else r.speed*=.96;
    if(!onTrack(r.mesh.position))r.speed*=.88;
    if(Math.abs(r.speed)>.01){
      const st=.044;
      if(lft)r.mesh.rotation.y+=st*Math.sign(r.speed);
      if(rgt)r.mesh.rotation.y-=st*Math.sign(r.speed);
    }
    const fwd=new THREE.Vector3(Math.sin(r.mesh.rotation.y),0,Math.cos(r.mesh.rotation.y));
    r.mesh.position.addScaledVector(fwd,r.speed);r.mesh.position.y=0;
    r.t=closestT(r.mesh.position);
  } else {
    const aiVar=r===racers[1]?.72:r===racers[2]?.75:.70;
    r.speed=Math.min(r.maxSpd*aiVar*mudMult,r.speed+r.accel*.55);
    r.t=(r.t+r.speed/300)%1;
    const p=curve.getPoint(r.t),tan=curve.getTangent(r.t);
    const rght=new THREE.Vector3(-tan.z,0,tan.x).normalize();
    const laneOff=r===racers[1]?-3.5:r===racers[2]?3.5:-1.5;
    r.mesh.position.set(p.x+rght.x*laneOff,0,p.z+rght.z*laneOff);
    r.mesh.rotation.y=Math.atan2(tan.x,tan.z);
    if(r.item){
      r.aiThrowTimer-=dt;
      const dist=r.mesh.position.distanceTo(P.mesh.position);
      const tan2=curve.getTangent(r.t);
      const toP=new THREE.Vector3().subVectors(P.mesh.position,r.mesh.position).normalize();
      const inFront=tan2.dot(toP)>0.3;
      if(r.aiThrowTimer<=0&&dist<40&&inFront){
        const dx=P.mesh.position.x-r.mesh.position.x,dz=P.mesh.position.z-r.mesh.position.z;
        const len=Math.sqrt(dx*dx+dz*dz)||1;
        const col={'🐚':0xdd6622,'⚡':0xffff00,'💣':0x222222,'🌶️':0xff2200,'🍄':0xee3311}[r.item]||0xff8800;
        const pj=new THREE.Mesh(new THREE.SphereGeometry(.8,8,6),new THREE.MeshLambertMaterial({color:col}));
        pj.position.copy(r.mesh.position).add(new THREE.Vector3(0,1.5,0));scene.add(pj);
        projs.push({mesh:pj,vx:(dx/len)*.85,vz:(dz/len)*.85,life:200,type:r.item,owner:r,wallBounces:0});
        r.item=null;r.aiThrowTimer=300+Math.floor(Math.random()*300);
      } else if(r.aiThrowTimer<=0){r.aiThrowTimer=60+Math.floor(Math.random()*60);}
    }
  }

  checkObstacles(r);checkItemPickup(r);
  r.wobble+=Math.abs(r.speed)*dt*150;
  r.mesh.children[0].position.y=.5+Math.sin(r.wobble)*.06;
  if(r.mesh.userData.shell)r.mesh.userData.shell.rotation.z=Math.sin(r.wobble*.4)*.05;
  r.mesh.children[0].material.color.setHex(r.mudTimer>0?0x8b6a30:r.cfg.bc);

  const prev=r.lastT,cur=r.t;
  if(cur>0.4&&cur<0.6)r.passedHalf=true;
  if(prev>0.85&&cur<0.15&&r.passedHalf){r.passedHalf=false;lapCrossed(r);}
  if(prev<0.15&&cur>0.85&&r.laps>0){r.laps--;if(r.cfg.isPlayer)document.getElementById('lapval').textContent=Math.max(1,r.laps+1);}
  r.lastT=cur;
}

function lapCrossed(r){
  r.laps++;
  if(r.cfg.isPlayer){
    const lt=(raceMs-lapStartMs)/1000;r.lapTimes.push(lt);
    if(lt<bestLap&&r.laps>0){bestLap=lt;document.getElementById('bestval').textContent=lt.toFixed(2)+'s';}
    lapStartMs=raceMs;
    document.getElementById('lapval').textContent=Math.min(r.laps,3);
    const namen=['Ronde één','Ronde twee','Ronde drie'];
    if(r.laps<3)showBanner('🏁 '+namen[r.laps]+'!',120);
  }
  if(r.laps>=3)finishRacer(r);
}

function finishRacer(r){r.finished=true;r.finishTime=raceMs;if(r.cfg.isPlayer)doFinish();}
function doFinish(){
  gameState='finished';
  const order=racers.filter(x=>x.finished).sort((a,b)=>a.finishTime-b.finishTime);
  const pos=order.indexOf(P)+1;
  const medals=['🥇 EERSTE!','🥈 TWEEDE','🥉 DERDE','💀 LAATSTE'];
  document.getElementById('fh1').textContent=pos===1?'🏆 GEWONNEN!':pos===2?'🥈 Tweede!':pos===3?'🥉 Derde...':'💀 Laatste...';
  document.getElementById('fp').textContent=medals[pos-1]+' plek';
  document.getElementById('ft').textContent='Totale tijd: '+(raceMs/1000).toFixed(2)+'s';
  document.getElementById('fb').textContent='Beste ronde: '+(bestLap===Infinity?'--':bestLap.toFixed(2)+'s');
  document.getElementById('finish').style.display='flex';
}
function updatePositions(){
  const sorted=[...racers].sort((a,b)=>(b.laps+b.t)-(a.laps+a.t));
  sorted.forEach((r,i)=>r.pos=i+1);
  document.getElementById('posnum').textContent=P.pos;
}

const mapCtx=document.getElementById('mapc').getContext('2d');
function drawMinimap(){
  mapCtx.clearRect(0,0,130,130);
  mapCtx.fillStyle='rgba(0,0,0,.65)';mapCtx.beginPath();mapCtx.arc(65,65,65,0,Math.PI*2);mapCtx.fill();
  mapCtx.strokeStyle='#444';mapCtx.lineWidth=7;mapCtx.beginPath();
  for(let i=0;i<=SEG;i++){const p=curve.getPoint(i/SEG),mx=65+p.x*.38,my=65+p.z*.38;i===0?mapCtx.moveTo(mx,my):mapCtx.lineTo(mx,my);}
  mapCtx.closePath();mapCtx.stroke();
  obstacles.forEach(obs=>{
    const mx=65+obs.position.x*.38,my=65+obs.position.z*.38;
    mapCtx.beginPath();mapCtx.arc(mx,my,3,0,Math.PI*2);
    mapCtx.fillStyle=obs.userData.type==='modder'?'#8b4513':obs.userData.type==='steen'?'#aaa':'#f80';
    mapCtx.fill();
  });
  ['#5ec922','#ff77aa','#33aaff','#ffcc33'].forEach((col,i)=>{
    const p=curve.getPoint(racers[i].t),mx=65+p.x*.38,my=65+p.z*.38;
    mapCtx.beginPath();mapCtx.arc(mx,my,i===0?5.5:3.5,0,Math.PI*2);
    mapCtx.fillStyle=col;mapCtx.fill();
    if(i===0){mapCtx.strokeStyle='#fff';mapCtx.lineWidth=1.5;mapCtx.stroke();}
  });
}

const cdEl=document.getElementById('cdnum');
const cdTexts=['3','2','1','GO! 🐌'];
const cdColors=['#ff4444','#ffaa00','#ffff00','#44ff44'];
let t0=performance.now();

function loop(){
  requestAnimationFrame(loop);
  const now=performance.now(),dt=Math.min(now-t0,50);t0=now;
  const t=now*.001;

  cloudArr.forEach(c=>{if(c.userData.drift)c.position.x+=c.userData.drift;});
  audienceArr.forEach(b=>{b.position.y=8.5+Math.abs(Math.sin(t*1.5+b.userData.wave))*.8;});
  obstacles.forEach(obs=>{if(obs.userData.type==='vat')obs.rotation.y+=.015;});
  itemBoxes.forEach(box=>{
    if(box.userData.active){box.rotation.y+=.03;box.children[0].rotation.x+=.02;}
    else if(now>box.userData.respawnAt){box.userData.active=true;box.visible=true;}
  });

  for(let i=projs.length-1;i>=0;i--){
    const pj=projs[i];
    pj.mesh.position.x+=pj.vx;pj.mesh.position.z+=pj.vz;pj.mesh.rotation.y+=.2;pj.life--;
    let bD=Infinity,bPt=null;
    for(let s=0;s<SEG;s++){
      const pt=curve.getPoint(s/SEG);
      const d=(pt.x-pj.mesh.position.x)**2+(pt.z-pj.mesh.position.z)**2;
      if(d<bD){bD=d;bPt=pt;}
    }
    const distC=Math.sqrt(bD);
    if(distC>TW/2-0.5){
      const nx=(pj.mesh.position.x-bPt.x)/distC,nz=(pj.mesh.position.z-bPt.z)/distC;
      const dot=pj.vx*nx+pj.vz*nz;
      pj.vx-=2*dot*nx;pj.vz-=2*dot*nz;
      pj.mesh.position.x=bPt.x+nx*(TW/2-1);pj.mesh.position.z=bPt.z+nz*(TW/2-1);
      pj.wallBounces=(pj.wallBounces||0)+1;
    }
    let hit=false;
    for(const r of racers){
      if(r===pj.owner||r.finished)continue;
      if(pj.mesh.position.distanceTo(r.mesh.position)<3){applyHit(r,pj.type,pj.mesh.position.clone());hit=true;break;}
    }
    if(hit||pj.life<=0||(pj.wallBounces||0)>=3){scene.remove(pj.mesh);projs.splice(i,1);}
  }

  if(gameState==='countdown'){
    cdTimer+=dt;
    const phase=Math.min(3,Math.floor(cdTimer/900));
    if(phase!==cdPhase){cdPhase=phase;cdEl.style.transform='scale(1.4)';setTimeout(()=>cdEl.style.transform='scale(1)',100);}
    if(cdTimer<3600){cdEl.textContent=cdTexts[phase];cdEl.style.color=cdColors[phase];cdEl.style.opacity=String(1-(cdTimer%900)/900*.6);}
    else{document.getElementById('countdown').style.display='none';gameState='racing';lapStartMs=0;}
    renderer.render(scene,camera);return;
  }

  if(gameState==='racing'){
    raceMs+=dt;document.getElementById('timeval').textContent=(raceMs/1000).toFixed(2);
    racers.forEach(r=>updateRacer(r,dt));updatePositions();
    document.getElementById('sval').textContent=Math.min(180,Math.round(Math.abs(P.speed)*60*3.6*.8));
    const trackTan=curve.getTangent(P.t);
    const fDir=new THREE.Vector3(Math.sin(P.mesh.rotation.y),0,Math.cos(P.mesh.rotation.y));
    if(fDir.dot(trackTan)<-0.5&&Math.abs(P.speed)>.05)wrongTimer=Math.min(150,wrongTimer+4);
    else wrongTimer=Math.max(0,wrongTimer-5);
    document.getElementById('wrongway').style.opacity=wrongTimer>40?'1':'0';
  }

  if(bannerTimer>0){bannerTimer-=dt/16;document.getElementById('banner').style.opacity=String(Math.min(1,bannerTimer/20));}

  const ang=P.mesh.rotation.y;
  const tcx=P.mesh.position.x-Math.sin(ang)*20,tcz=P.mesh.position.z-Math.cos(ang)*20;
  camera.position.x+=(tcx-camera.position.x)*.15;
  camera.position.y+=(P.mesh.position.y+9-camera.position.y)*.15;
  camera.position.z+=(tcz-camera.position.z)*.15;
  camera.lookAt(P.mesh.position.x,P.mesh.position.y+2.5,P.mesh.position.z);

  drawMinimap();renderer.render(scene,camera);
}
loop();
</script>
